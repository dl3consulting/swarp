syntax = "proto3";
package swarp.v1;

option go_package = "github.com/dl3consulting/swarp-proto/swarp/v1;swarpv1";

// Runner -> Router registration and dispatch stream
service AgentRegistryService {
  // Long-lived bidirectional stream. Agent opens at startup, keeps open for
  // its lifetime. Router pushes WorkRequest messages; agent sends AgentEvent
  // messages back on the same stream.
  rpc Connect(stream ConnectRequest) returns (stream ConnectResponse);
}

// Plugin/MCP -> Router communication
// Plugins must implement DispatchTask. ListAgents, CancelTask, GetAgentStatus are optional.
service AgentDispatchService {
  rpc DispatchTask(DispatchTaskRequest) returns (stream DispatchTaskResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
  rpc GetAgentStatus(GetAgentStatusRequest) returns (GetAgentStatusResponse);
  // PushRestart tells the router to send ConnectResponse.Restart to one or
  // all connected agents. The router sets a draining flag on affected
  // sessions and rejects further DispatchTask calls for them until the
  // agents reconnect.
  rpc PushRestart(PushRestartRequest) returns (PushRestartResponse);
}

message ConnectRequest {
  oneof msg {
    Hello hello = 1;
    AgentEvent event = 2;
  }
}

message Hello {
  string name = 1;
  string version = 2;
  repeated ModeInfo modes = 3;
  string avatar_url = 4;
}

message ConnectResponse {
  oneof msg {
    Welcome welcome = 1;
    WorkRequest work = 2;
    RestartRequest restart = 3;
  }
}

// RestartRequest asks the runner to drain its current task (if any), then
// call CheckForUpdate and re-exec itself. Sent by the router on operator
// demand. The router will reject new DispatchTask calls for this agent
// with codes.FailedPrecondition until the stream closes and a fresh
// runner process re-registers.
message RestartRequest {
  string reason = 1;
}

message Welcome {
  bool accepted = 1;
  string reason = 2;
}

message WorkRequest {
  string task_id = 1;
  string mode = 2;
  map<string, string> params = 3;
  string session_id = 4;
  int32 remaining_budget = 5;
}

message DispatchTaskRequest {
  string agent = 1;

  oneof dispatch {
    StructuredDispatch structured = 2;
    string raw_text = 3;
  }

  string callback_id = 4;
  string session_id = 5;
  int32 remaining_budget = 6;
}

message DispatchTaskResponse {
  AgentEvent event = 1;
}

message StructuredDispatch {
  string mode = 1;
  map<string, string> params = 2;
}

message AgentIdentity {
  string name = 1;
  string avatar_url = 2;
}

message AgentEvent {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    EVENT_TYPE_THINKING = 1;
    EVENT_TYPE_TOOL_USE = 2;
    EVENT_TYPE_DONE = 3;
    EVENT_TYPE_ERROR = 4;
    EVENT_TYPE_ACK = 5;
  }
  string task_id = 1;
  EventType type = 2;
  string text = 3;
  string session_id = 4;
  TaskResult result = 5;
  int64 timestamp = 6;
  AgentIdentity agent = 7;
}

message TaskResult {
  string status = 1;
  string summary = 2;
  map<string, string> structured = 3;
  CostInfo cost = 4;
  repeated string notify = 5;
}

message CostInfo {
  double usd = 1;
  int32 turns = 2;
  int64 duration_ms = 3;
}

message CancelTaskRequest {
  string task_id = 1;
}

message CancelTaskResponse {
  string status = 1;
}

message ListAgentsRequest {}

message ListAgentsResponse {
  repeated AgentInfo agents = 1;
}

message AgentInfo {
  string name = 1;
  string display_name = 2;
  string role = 3;
  repeated ModeInfo modes = 4;
  bool online = 5;
  string avatar_url = 6;
}

message ModeInfo {
  string name = 1;
  string description = 2;
  string model = 3;
  int32 max_turns = 4;
}

message GetAgentStatusRequest {
  string agent = 1;
}

message GetAgentStatusResponse {
  bool up = 1;
  string status = 2;
  string mode = 3;
  CostInfo last_cost = 4;
}

message PushRestartRequest {
  // Empty means broadcast to every connected agent.
  string agent = 1;
  string reason = 2;
}

message PushRestartResponse {
  int32 agents_notified = 1;
}
